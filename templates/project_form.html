{% extends "base.html" %}

{% block title %}Add Project | ClearPath{% endblock %}

{% block content %}
<section class="page-header">
  <div>
    <span class="eyebrow">Project Setup</span>
    <h1>Create a project</h1>
    <p class="muted">Capture the core details and approval categories for this compliance workspace.</p>
  </div>
</section>

<section class="panel form-panel">
  <form method="post" class="stack-form">
    <label>
      <span>Project name</span>
      <input type="text" name="name" required />
    </label>

    <label>
      <span>Client name</span>
      <input type="text" name="client_name" required />
    </label>

    <label>
      <span>Location</span>
      <input type="text" name="location" required />
    </label>

    <label>
      <span>Approvals</span>
      <select name="approval_types" multiple size="3" required>
        {% for approval in approval_types %}
        <option value="{{ approval }}">{{ approval }}</option>
        {% endfor %}
      </select>
    </label>

    <button type="submit">Save Project</button>
  </form>
</section>
{% endblock %}
